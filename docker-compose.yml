# Postgres no host (mesmo PC): DATABASE_URL com localhost ou 127.0.0.1.
# `network_mode: host` — localhost no URL é o PostgreSQL do SO.
#
#   docker compose up --build
#
# O Docker Compose lê `.env` na raiz para substituir ${VAR}. Mesmos nomes que o Dockerfile
# (PORTA, DIRETORIO_ARMAZENAMENTO, BASE_URL) + DATABASE_URL e API_KEY_ADMIN.

services:
  app:
    build: .
    network_mode: host
    environment:
      PORTA: ${PORTA:-3000}
      DATABASE_URL: ${DATABASE_URL}
      API_KEY_ADMIN: ${API_KEY_ADMIN}
      BASE_URL: ${BASE_URL:-}
      DIRETORIO_ARMAZENAMENTO: /app/armazenamento
    volumes:
      # Use só um dos dois (comente o outro):
      - filestore:/app/armazenamento
      # - /root/FileStorageProjetos:/app/armazenamento
    restart: unless-stopped

volumes:
  filestore:
